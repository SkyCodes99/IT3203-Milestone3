<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cineplex — Movie SPA | Milestone 3</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER — sticky navigation + search
  ═══════════════════════════════════════════ -->
  <header id="site-header">

    <div id="logo">CINE<span>PLEX</span></div>

    <!-- Collection / Category Nav Tabs -->
    <nav id="nav-tabs" aria-label="Movie categories">
      <button class="nav-tab active" data-cat="popular">Popular</button>
      <button class="nav-tab" data-cat="top_rated">Top Rated</button>
      <button class="nav-tab" data-cat="upcoming">Upcoming</button>
    </nav>

    <!-- Search -->
    <div id="search-wrapper" role="search">
      <input
        type="text"
        id="search-input"
        placeholder="Search movies…"
        aria-label="Search movies"
        autocomplete="off"
      >
      <button id="search-btn" aria-label="Search">Search</button>
    </div>

  </header>

  <!-- ══════════════════════════════════════════
       MAIN APP LAYOUT — two-column SPA
  ═══════════════════════════════════════════ -->
  <div id="app">

    <!-- ── LEFT / MAIN PANEL ──────────────────────── -->
    <main id="main-panel" aria-label="Movie results">

      <!-- Section heading -->
      <div class="section-title" aria-live="polite">
        <span id="section-title-text">Popular Movies</span>
        <span class="section-badge" id="section-badge"></span>
      </div>

      <!-- Movie grid (populated by JS) -->
      <div id="movie-grid" class="movie-grid" role="list" aria-label="Movie list"></div>

      <!-- Pagination (populated by JS) -->
      <nav id="pagination" aria-label="Pagination"></nav>

    </main>

    <!-- ── RIGHT / DETAIL PANEL ──────────────────── -->
    <aside id="detail-panel" aria-label="Movie details" aria-live="polite">

      <!-- Empty state -->
      <div id="detail-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="2" y="2" width="20" height="20" rx="2"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
          <line x1="12" y1="7" x2="12" y2="17"/>
        </svg>
        <p>Click any movie to see details here.</p>
      </div>

      <!-- Detail content (hidden until populated) -->
      <div id="detail-content">

        <!-- Backdrop image -->
        <img id="detail-backdrop" src="" alt="" role="presentation">

        <!-- Poster + title row -->
        <div id="detail-poster-row">
          <img id="detail-poster" src="" alt="">
          <div id="detail-poster-missing" style="display:none">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="2" y="2" width="20" height="20" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div>
            <h2 id="detail-title"></h2>
            <div class="detail-meta" id="detail-meta"></div>
          </div>
        </div>

        <div class="detail-divider"></div>

        <!-- Overview -->
        <p id="detail-overview-label">Overview</p>
        <p id="detail-overview"></p>

        <!-- Genres -->
        <div id="detail-genres"></div>

        <div class="detail-divider"></div>

        <!-- Extra stats grid -->
        <div class="detail-extra-row">
          <div class="detail-extra-item">
            <label>Budget</label>
            <span id="detail-budget">—</span>
          </div>
          <div class="detail-extra-item">
            <label>Revenue</label>
            <span id="detail-revenue">—</span>
          </div>
          <div class="detail-extra-item">
            <label>Language</label>
            <span id="detail-lang">—</span>
          </div>
          <div class="detail-extra-item">
            <label>Vote Count</label>
            <span id="detail-votes">—</span>
          </div>
        </div>

      </div><!-- /detail-content -->

    </aside><!-- /detail-panel -->

  </div><!-- /app -->

  <!-- ══════════════════════════════════════════
       SCRIPTS — jQuery then our app
  ═══════════════════════════════════════════ -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script src="js/app.js"></script>

</body>
</html>
